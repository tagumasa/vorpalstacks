name: Feature Request
description: Suggest a new feature or enhancement
labels: enhancement
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like.
      placeholder: What would you like Vorpalstacks to do?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed?
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've tried.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the feature request.
