name: Bug Report
description: Report a bug or unexpected behavior
labels: bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the issue.
      placeholder: |
        1. Start server with ...
        2. Run command ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Relevant log output or error messages.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit hash or version tag.
      placeholder: abc1234
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: 1.25.x
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
